<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layer Panel</title>
    <style>
        :root {
            --bg-primary: #1e1e1e;
            --bg-secondary: #252526;
            --bg-tertiary: #2d2d30;
            --text-primary: #cccccc;
            --text-secondary: #9d9d9d;
            --text-muted: #6d6d6d;
            --accent: #0e639c;
            --border: #3c3c3c;
            --success: #4ec9b0;
            --warning: #dcdcaa;
            --info: #9cdcfe;
            --error: #f48771;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-size: 13px;
            line-height: 1.4;
            padding: 16px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        h1 {
            font-size: 18px;
            font-weight: 500;
            margin-bottom: 16px;
        }

        .summary {
            display: flex;
            gap: 16px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .stat-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stat-value {
            font-size: 20px;
            font-weight: 600;
            color: var(--info);
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .search-bar {
            margin-bottom: 12px;
        }

        .search-input {
            width: 100%;
            padding: 8px 12px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text-primary);
            font-size: 13px;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .layer-list {
            border: 1px solid var(--border);
            border-radius: 6px;
            overflow: hidden;
        }

        .layer-item {
            display: flex;
            align-items: center;
            padding: 10px 12px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            gap: 12px;
        }

        .layer-item:last-child {
            border-bottom: none;
        }

        .layer-item:hover {
            background: var(--bg-tertiary);
        }

        .layer-visibility {
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        .layer-visibility.on {
            color: var(--success);
        }

        .layer-visibility.off {
            color: var(--text-muted);
        }

        .layer-color {
            width: 16px;
            height: 16px;
            border-radius: 3px;
            border: 1px solid var(--border);
            flex-shrink: 0;
        }

        .layer-name {
            flex: 1;
            font-weight: 500;
        }

        .layer-name.current {
            color: var(--warning);
        }

        .layer-locked {
            color: var(--text-muted);
            font-size: 12px;
        }

        .layer-frozen {
            color: var(--info);
            font-size: 12px;
        }

        .badge {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 3px;
            text-transform: uppercase;
        }

        .badge-current {
            background: var(--warning);
            color: var(--bg-primary);
        }

        .badge-locked {
            background: var(--text-muted);
            color: var(--bg-primary);
        }

        .badge-frozen {
            background: var(--info);
            color: var(--bg-primary);
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
        }

        .results-count {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Layer Panel</h1>

        <div class="summary" id="summary"></div>

        <div class="search-bar">
            <input type="text" class="search-input" id="searchInput" placeholder="Search layers...">
        </div>

        <div class="results-count" id="resultsCount"></div>

        <div class="layer-list" id="layerList"></div>
    </div>

    <script>
        // Data injected from server
        const rawData = /*DATA_PLACEHOLDER*/[];

        // Extract layers array
        const layerData = rawData.layers || rawData || [];

        // Color index to RGB (basic AutoCAD ACI colors)
        const ACI_COLORS = {
            1: '#ff0000', // Red
            2: '#ffff00', // Yellow
            3: '#00ff00', // Green
            4: '#00ffff', // Cyan
            5: '#0000ff', // Blue
            6: '#ff00ff', // Magenta
            7: '#ffffff', // White
            8: '#808080', // Gray
            9: '#c0c0c0', // Light Gray
        };

        function getColorHex(colorValue) {
            if (typeof colorValue === 'string' && colorValue.startsWith('#')) {
                return colorValue;
            }
            const index = parseInt(colorValue);
            return ACI_COLORS[index] || '#808080';
        }

        let filteredLayers = [...layerData];

        document.addEventListener('DOMContentLoaded', () => {
            renderSummary();
            renderLayers();
            setupEventListeners();
        });

        function renderSummary() {
            const summary = document.getElementById('summary');
            const total = layerData.length;
            const visible = layerData.filter(l => l.on !== false).length;
            const locked = layerData.filter(l => l.locked === true).length;

            summary.innerHTML = `
                <div class="stat-card">
                    <div class="stat-value">${total}</div>
                    <div class="stat-label">Total Layers</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${visible}</div>
                    <div class="stat-label">Visible</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${locked}</div>
                    <div class="stat-label">Locked</div>
                </div>
            `;
        }

        function filterLayers() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            filteredLayers = layerData.filter(layer => {
                const name = (layer.name || layer.Name || '').toLowerCase();
                return name.includes(search);
            });
            renderLayers();
        }

        function renderLayers() {
            const list = document.getElementById('layerList');
            const resultsCount = document.getElementById('resultsCount');

            resultsCount.textContent = `Showing ${filteredLayers.length} of ${layerData.length} layers`;

            if (filteredLayers.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        No layers found
                    </div>
                `;
                return;
            }

            list.innerHTML = filteredLayers.map(layer => {
                const name = layer.name || layer.Name || 'Unknown';
                const isOn = layer.on !== false;
                const isLocked = layer.locked === true;
                const isFrozen = layer.frozen === true;
                const isCurrent = layer.current === true;
                const color = layer.color || layer.Color || 7;

                let badges = '';
                if (isCurrent) badges += '<span class="badge badge-current">Current</span> ';
                if (isLocked) badges += '<span class="badge badge-locked">Locked</span> ';
                if (isFrozen) badges += '<span class="badge badge-frozen">Frozen</span> ';

                return `
                    <div class="layer-item">
                        <div class="layer-visibility ${isOn ? 'on' : 'off'}">
                            ${isOn ? '\u{1F441}' : '\u{1F441}\u{FE0F}\u{200D}\u{1F5E8}'}
                        </div>
                        <div class="layer-color" style="background-color: ${getColorHex(color)}"></div>
                        <div class="layer-name ${isCurrent ? 'current' : ''}">${name}</div>
                        ${badges}
                    </div>
                `;
            }).join('');
        }

        function setupEventListeners() {
            document.getElementById('searchInput').addEventListener('input', filterLayers);
        }
    </script>
</body>
</html>
